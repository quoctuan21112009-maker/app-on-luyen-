<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - ONLUYEN Batch</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .alert {
            margin-bottom: 20px;
            padding: 12px;
            border-radius: 5px;
            display: none;
        }

        .alert.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .alert.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 10px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
            background-color: white;
            cursor: pointer;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab-btn {
            padding: 10px 20px;
            border: none;
            background: none;
            cursor: pointer;
            color: #999;
            font-weight: 600;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🎓 ONLUYEN Batch</h1>

        <div id="alert" class="alert"></div>

        <!-- Tabs for switching between modes -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="select">📋 Chọn Acc</button>
            <button class="tab-btn" data-tab="register">➕ Đăng Ký Mới</button>
        </div>

        <!-- Tab 1: Select existing account -->
        <div id="select" class="tab-content active">
            <form id="selectForm">
                <div class="form-group">
                    <label for="selectAccount">Chọn Tài Khoản <span style="color: red;">*</span></label>
                    <select id="selectAccount" required>
                        <option value="">-- Đang tải danh sách... --</option>
                    </select>
                </div>

                <button type="submit">Tiếp Tục →</button>
            </form>
        </div>

        <!-- Tab 2: Register new account -->
        <div id="register" class="tab-content">
            <form id="loginForm">
                <div class="form-group">
                    <label for="ten">Họ và Tên <span style="color: red;">*</span></label>
                    <input type="text" id="ten" name="ten" required placeholder="Nhập họ tên">
                </div>

                <div class="form-group">
                    <label for="lop">Lớp <span style="color: red;">*</span></label>
                    <input type="text" id="lop" name="lop" required placeholder="Ví dụ: 11a1">
                </div>

                <div class="form-group">
                    <label for="taikhoan">Tài Khoản (Email) <span style="color: red;">*</span></label>
                    <input type="email" id="taikhoan" name="taikhoan" required placeholder="email@example.com">
                </div>

                <div class="form-group">
                    <label for="matkhau">Mật Khẩu <span style="color: red;">*</span></label>
                    <input type="password" id="matkhau" name="matkhau" required placeholder="Nhập mật khẩu">
                </div>

                <button type="submit">Đăng Ký & Tiếp Tục →</button>
            </form>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <span>Đang xử lý...</span>
        </div>
    </div>

    <script>
        // Tab switching logic
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const tabName = btn.getAttribute('data-tab');

                // Remove active from all
                tabBtns.forEach(b => b.classList.remove('active'));
                tabContents.forEach(c => c.classList.remove('active'));

                // Add active to clicked
                btn.classList.add('active');
                document.getElementById(tabName).classList.add('active');

                // Clear alerts when switching tabs
                alertDiv.classList.remove('success', 'error');
                alertDiv.innerHTML = '';
            });
        });

        // Load accounts from CSV
        async function loadAccounts() {
            try {
                console.log('[DEBUG] Fetching accounts from /get-accounts...');
                const response = await fetch('/get-accounts');
                console.log('[DEBUG] Response status:', response.status);

                const data = await response.json();
                console.log('[DEBUG] Response data:', data);

                if (data.success && data.accounts && data.accounts.length > 0) {
                    console.log(`[DEBUG] Loaded ${data.accounts.length} accounts`);
                    const selectElement = document.getElementById('selectAccount');
                    selectElement.innerHTML = '<option value="">-- Chọn một tài khoản --</option>';

                    data.accounts.forEach(acc => {
                        const option = document.createElement('option');
                        option.value = acc.email;
                        option.textContent = `${acc.name} (${acc.email})`;
                        selectElement.appendChild(option);
                        console.log(`[DEBUG] Added option: ${acc.name} (${acc.email})`);
                    });
                } else {
                    console.warn('[DEBUG] No accounts found or success=false');
                    const selectElement = document.getElementById('selectAccount');
                    selectElement.innerHTML = '<option value="">Không có tài khoản nào</option>';
                }
            } catch (error) {
                console.error('[ERROR] Failed to load accounts:', error);
                const selectElement = document.getElementById('selectAccount');
                selectElement.innerHTML = '<option value="">Lỗi tải danh sách: ' + error.message + '</option>';
            }
        }

        // Load accounts when page loads
        loadAccounts();

        const alertDiv = document.getElementById('alert');
        const loading = document.getElementById('loading');

        // Select account form
        const selectForm = document.getElementById('selectForm');
        selectForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const selectedEmail = document.getElementById('selectAccount').value;

            if (!selectedEmail) {
                alertDiv.classList.add('error');
                alertDiv.innerHTML = '✗ Vui lòng chọn một tài khoản';
                return;
            }

            loading.style.display = 'block';
            alertDiv.classList.remove('success', 'error');
            alertDiv.innerHTML = '';

            try {
                // For now, just redirect to homework page
                // In a real app, you'd want to persist this selection
                sessionStorage.setItem('selectedAccount', selectedEmail);
                setTimeout(() => {
                    window.location.href = '/homework';
                }, 1000);
            } catch (error) {
                alertDiv.classList.add('error');
                alertDiv.innerHTML = `✗ Lỗi: ${error.message}`;
            } finally {
                loading.style.display = 'none';
            }
        });

        // Register new account form
        const form = document.getElementById('loginForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const ten = document.getElementById('ten').value;
            const lop = document.getElementById('lop').value;
            const taikhoan = document.getElementById('taikhoan').value;
            const matkhau = document.getElementById('matkhau').value;

            loading.style.display = 'block';
            alertDiv.classList.remove('success', 'error');
            alertDiv.innerHTML = '';

            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ ten, lop, taikhoan, matkhau })
                });

                const data = await response.json();

                if (data.success) {
                    alertDiv.classList.add('success');
                    alertDiv.innerHTML = `✓ ${data.message}`;
                    form.reset();

                    // Reload account list
                    loadAccounts();

                    // Switch back to select tab
                    document.querySelector('[data-tab="select"]').click();

                    // Chuyển đến trang nhập ID bài sau 2 giây
                    setTimeout(() => {
                        window.location.href = '/homework';
                    }, 2000);
                } else {
                    alertDiv.classList.add('error');
                    alertDiv.innerHTML = `✗ ${data.message}`;
                }
            } catch (error) {
                alertDiv.classList.add('error');
                alertDiv.innerHTML = `✗ Lỗi: ${error.message}`;
            } finally {
                loading.style.display = 'none';
            }
        });
    </script>
</body>

</html>
