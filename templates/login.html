<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - ONLUYEN Batch</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .alert {
            margin-bottom: 20px;
            padding: 12px;
            border-radius: 5px;
            display: none;
        }

        .alert.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .alert.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 10px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📝 Đăng Ký Tài Khoản</h1>

        <div id="alert" class="alert"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="ten">Họ và Tên <span style="color: red;">*</span></label>
                <input type="text" id="ten" name="ten" required placeholder="Nhập họ tên">
            </div>

            <div class="form-group">
                <label for="lop">Lớp <span style="color: red;">*</span></label>
                <input type="text" id="lop" name="lop" required placeholder="Ví dụ: 11a1">
            </div>

            <div class="form-group">
                <label for="taikhoan">Tài Khoản (Email) <span style="color: red;">*</span></label>
                <input type="email" id="taikhoan" name="taikhoan" required placeholder="email@example.com">
            </div>

            <div class="form-group">
                <label for="matkhau">Mật Khẩu <span style="color: red;">*</span></label>
                <input type="password" id="matkhau" name="matkhau" required placeholder="Nhập mật khẩu">
            </div>

            <button type="submit">Đăng Ký & Tiếp Tục →</button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <span>Đang xử lý...</span>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const alertDiv = document.getElementById('alert');
        const loading = document.getElementById('loading');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const ten = document.getElementById('ten').value;
            const lop = document.getElementById('lop').value;
            const taikhoan = document.getElementById('taikhoan').value;
            const matkhau = document.getElementById('matkhau').value;

            loading.style.display = 'block';
            alertDiv.classList.remove('success', 'error');
            alertDiv.innerHTML = '';

            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ ten, lop, taikhoan, matkhau })
                });

                const data = await response.json();

                if (data.success) {
                    alertDiv.classList.add('success');
                    alertDiv.innerHTML = `✓ ${data.message}`;
                    form.reset();

                    // Chuyển đến trang nhập ID bài sau 2 giây
                    setTimeout(() => {
                        window.location.href = '/homework';
                    }, 2000);
                } else {
                    alertDiv.classList.add('error');
                    alertDiv.innerHTML = `✗ ${data.message}`;
                }
            } catch (error) {
                alertDiv.classList.add('error');
                alertDiv.innerHTML = `✗ Lỗi: ${error.message}`;
            } finally {
                loading.style.display = 'none';
            }
        });
    </script>
</body>

</html>
